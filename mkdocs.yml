site_name: netimps
site_description: "Network utilities every tool ends up rewriting: interface discovery, reachability, CIDR maths, DNS, ping, scanning and multicast"
site_url: https://jose-pr.github.io/netimps/
repo_url: https://github.com/jose-pr/netimps
repo_name: jose-pr/netimps
edit_uri: edit/main/docs/

# Constrain the scan to docs/ so pymdownx.snippets + strict nav don't trip on
# repo-level markdown (see kb/PYTHON.md Known Difficulties).
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  # EXECUTOR: add guide pages and one API page per public module.
  - API Reference:
      - Overview: api/reference.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - tables
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
